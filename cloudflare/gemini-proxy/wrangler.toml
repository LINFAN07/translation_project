# Cloudflare Workers：Gemini 代理（API 金鑰僅存在 Secrets，勿寫入此檔）
# 部署：npm i && npx wrangler deploy
# 金鑰：npx wrangler secret put GEMINI_API_KEY
# 選用：npx wrangler secret put WORKER_AUTH_SECRET（客戶端需帶 Authorization: Bearer <同值>）

name = "translation-gemini-proxy"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# 若未設 WORKER_AUTH_SECRET，Worker 仍會轉發 Gemini，但 URL 外洩時可能被濫用；生產環境務必設定。
